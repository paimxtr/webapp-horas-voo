version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: webapp-horas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-horas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-horas_secret}
      POSTGRES_DB: ${POSTGRES_DB:-horas_voo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-horas} -d ${POSTGRES_DB:-horas_voo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webapp-horas-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-horas}:${POSTGRES_PASSWORD:-horas_secret}@db:5432/${POSTGRES_DB:-horas_voo}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
