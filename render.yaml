databases:
  - name: horas-voo-db
    plan: free
    databaseName: horas_voo
    user: horas

services:
  - type: web
    name: webapp-horas-voo
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: horas-voo-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
